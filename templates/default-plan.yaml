# ═══════════════════════════════════════════════════════════════════════════════
#  VentureWiki Plan Template
#  ─────────────────────────────────────────────────────────────────────────────
#  This template defines every field in a VentureWiki venture plan.
#  Each field includes an instruction comment explaining what to write.
#  The AI venture generator uses this template to create new ventures.
# ═══════════════════════════════════════════════════════════════════════════════

# ── Meta (auto-generated, do not edit) ────────────────────────────────────────
id: "{{slug}}"
slug: "{{slug}}"
owner: "{{owner}}"
createdBy: "{{userId}}"
contributors:
  - "{{userId}}"
viewCount: 0
editCount: 0
isPublic: true
isArchived: false
isFeatured: false
createdAt: "{{createdAt}}"
updatedAt: "{{updatedAt}}"

# ══════════════════════════════════════════════════════════════════════════════
#  PAGE 1: COVER & SNAPSHOT
#  The first impression — name, positioning, and key metrics at a glance.
# ══════════════════════════════════════════════════════════════════════════════
cover:
  # Company name — the official registered or operating name
  companyName: ""

  # Tagline — one punchy sentence (max 120 chars) that captures the value prop
  # Example: "AI-powered legal contracts in plain English"
  tagline: ""

  # Mission — why this company exists, what problem it solves, for whom
  # Write 1-3 sentences. Focus on the immediate impact.
  mission: ""

  # Vision — the ambitious long-term future state (3-10 years out)
  # Write 1-2 sentences. Think big but credible.
  vision: ""

  # Product type — what kind of product is this?
  # Options: web-app | website | ai-agent | api | hybrid | other
  productType: "web-app"

  # Industry vertical — the primary market category
  # Examples: "FinTech", "HealthTech", "EdTech", "SaaS", "E-commerce"
  industryVertical: ""

  # Stage — current company stage
  # Options: idea | mvp | beta | live | scaling | exited
  stage: "idea"

  # Funding stage — current funding status
  # Options: bootstrapped | pre-seed | seed | series-a | series-b+
  fundingStage: "bootstrapped"

  # Headquarters — city and state/country
  # Example: "San Francisco, CA" or "London, UK"
  headquarters: ""

  # Legal structure — business entity type
  # Examples: "LLC", "C-Corp", "B-Corp", "Sole Proprietorship"
  legalStructure: "LLC"

  # Website URL (optional) — include https://
  websiteUrl: ""

  # Logo emoji — a single emoji that represents the venture visually
  logoEmoji: "🚀"

  # Accent color — hex color for the venture card
  accentColor: "#E8622A"

  # Version — plan version number
  version: "v1.0"

  # Prepared by — who wrote this plan
  preparedBy: ""

  # Funding sought (optional) — amount being raised, if any
  # Example: "$500K Pre-Seed"
  fundingSought: ""

  # Traction highlights — key proof points (fill what you have, leave rest empty)
  tractionHighlights:
    # Revenue — current MRR/ARR or revenue milestone
    # Example: "$12K MRR", "Pre-revenue", "$50K pilot contract"
    revenue: ""

    # Users — user/customer count or growth metric
    # Example: "2,500 beta users", "50 enterprise pilots"
    users: ""

    # Partnerships — strategic alliances or integrations
    # Example: "Partnership with Stripe, 3 enterprise LOIs"
    partnerships: ""

    # Press — notable media coverage or awards
    # Example: "Featured in TechCrunch, Y Combinator W24"
    press: ""

# ══════════════════════════════════════════════════════════════════════════════
#  PAGE 2: PROBLEM, SOLUTION & MARKET
#  Define the pain you solve, how you solve it, and the market size.
# ══════════════════════════════════════════════════════════════════════════════
problemSolution:
  # Core pain point — the #1 problem in one clear paragraph
  # Be specific: who hurts, what hurts, why existing solutions fail
  corePainPoint: ""

  # Pain dimensions — break down the problem systematically
  painDimensions:
    # Who — describe the specific persona(s) experiencing this pain
    # Example: "Mid-market SaaS founders with 10-50 employees"
    who: ""

    # Frequency — how often does this problem occur?
    # Example: "Daily — every new hire triggers 3-5 hours of manual onboarding"
    frequency: ""

    # Current workarounds — what do people do today instead?
    # Example: "Spreadsheets + manual email chains + Notion docs"
    currentWorkarounds: ""

    # Cost of problem — quantify the impact (time, money, emotional)
    # Example: "$15K/month in lost productivity per team of 20"
    costOfProblem: ""

    # Urgency level — how pressing is this for the target user?
    # Example: "High — compliance deadlines create hard cutoffs"
    urgencyLevel: ""

  # Solution one-liner — your solution in a single sentence
  # Format: "[Product] helps [who] [do what] by [how], resulting in [outcome]"
  solutionOneLiner: ""

  # Features — list 3-6 core features with benefits and tech
  features:
    - feature: ""
      # What specific capability does this provide?
      benefit: ""
      # What's the user benefit? ("saves 5 hours/week", "reduces errors by 80%")
      techLayer: ""
      # What technology powers this? ("GPT-4o", "React + WebSocket", "PostgreSQL")

  # Unfair advantage — why can YOU win and others can't easily copy?
  # Think: proprietary data, unique team, network effects, patents, relationships
  unfairAdvantage: ""

  # Market sizing — TAM, SAM, SOM with sources
  market:
    # TAM (Total Addressable Market) — the entire global market if you had 100% share
    tam: ""           # Description, e.g. "Global HR software market"
    tamSize: ""       # Dollar amount, e.g. "$30B/yr"
    tamSource: ""     # Source, e.g. "Gartner 2024"

    # SAM (Serviceable Addressable Market) — the segment you can realistically target
    sam: ""           # Description, e.g. "US mid-market HR onboarding"
    samSize: ""       # Dollar amount, e.g. "$4.2B/yr"
    samSource: ""     # Source

    # SOM (Serviceable Obtainable Market) — what you'll capture in 12-18 months
    som: ""           # Description, e.g. "NYC startups with 10-50 employees"
    somSize: ""       # Dollar amount, e.g. "$200K"
    somSource: ""     # Source or methodology

  # Why now — what macro trends make this the right moment?
  # Consider: regulation changes, tech breakthroughs, cultural shifts, competitor exits
  whyNow: ""

# ══════════════════════════════════════════════════════════════════════════════
#  PAGE 3: PRODUCT & GO-TO-MARKET
#  Technical architecture, pricing, GTM strategy, and competitive positioning.
# ══════════════════════════════════════════════════════════════════════════════
productGtm:
  # Tech stack — your technical architecture
  techStack:
    productType: ""     # Same as cover.productType, more detail allowed
    frontend: ""        # e.g. "Next.js 14 + React 18 + Tailwind CSS"
    backend: ""         # e.g. "Node.js + Express + PostgreSQL"
    aiLayer: ""         # e.g. "OpenAI GPT-4o + LangChain + Pinecone"
    dataStorage: ""     # e.g. "Supabase (Postgres) + S3 for docs"
    authPayments: ""    # e.g. "Clerk + Stripe"
    hosting: ""         # e.g. "Vercel (frontend) + Railway (API)"
    buildStage: ""      # e.g. "50% complete, core API done, UI in progress"
    ipLayer: ""         # e.g. "Proprietary matching algorithm, pending patent"

  # GTM channels — your go-to-market strategy (list 3-5 channels)
  gtmChannels:
    - channel: ""       # e.g. "Content Marketing"
      tactic: ""        # e.g. "Weekly blog posts + LinkedIn thought leadership"
      goal90Day: ""     # e.g. "1,000 organic visitors/mo, 50 signups"
      owner: ""         # e.g. "CEO"
      budgetPerMonth: "" # e.g. "$500"

  # ICP (Ideal Customer Profile) — describe your perfect customer in detail
  # Include: role, company size, industry, budget, buying triggers
  icp: ""

  # Pricing model — how you charge
  # Examples: "Freemium + Pro tier", "Usage-based", "Per-seat SaaS"
  pricingModel: ""

  # Price point — specific pricing
  # Example: "Free tier → $29/mo Pro → $99/mo Team → Custom Enterprise"
  pricePoint: ""

  # Sales motion — how deals close
  # Examples: "Product-led growth", "Inside sales", "Enterprise AE team"
  salesMotion: ""

  # Time to value — how quickly does a new user get value?
  # Example: "5 minutes to first insight, 1 week to full ROI"
  timeToValue: ""

  # Competitive landscape — compare across key dimensions
  competitors:
    - dimension: "Core capability"
      yourProduct: ""     # How you perform on this dimension
      competitorA: ""     # Named competitor and their approach
      competitorB: ""     # Named competitor and their approach
      competitorC: ""     # Named competitor and their approach

# ══════════════════════════════════════════════════════════════════════════════
#  PAGE 4: TEAM & ROADMAP
#  Who's building this, what are the KPIs, and what's the execution plan.
# ══════════════════════════════════════════════════════════════════════════════
teamRoadmap:
  # Founders — key team members (list all co-founders)
  founders:
    - name: ""
      role: ""            # e.g. "CEO & Co-founder"
      background: ""      # e.g. "Ex-Google PM, 8 years in HR tech"
      commitment: ""      # e.g. "Full-time" or "Part-time (transitioning Q2)"
      equity: ""          # e.g. "40%"

  # Advisors — notable advisors or board members
  # Example: "Jane Smith (ex-VP Eng at Stripe), Bob Lee (angel, invested in 20+ startups)"
  advisors: ""

  # Open roles — positions you're hiring for
  # Example: "Senior Full-Stack Engineer, Head of Sales, ML Engineer"
  openRoles: ""

  # KPIs — the metrics that matter most (list 3-5)
  kpis:
    - metric: "MRR"       # Metric name
      current: ""          # Current value
      target3mo: ""        # 3-month target
      target12mo: ""       # 12-month target
      notes: ""            # Context or methodology

  # Milestones — execution roadmap (list 4-8 key milestones)
  milestones:
    - milestone: ""        # e.g. "MVP Launch"
      owner: ""            # Who is responsible
      targetDate: ""       # e.g. "2025-Q2"
      budget: ""           # Cost for this milestone
      successCriteria: ""  # How you'll know it's done
      status: "not-started"  # not-started | in-progress | done | delayed

# ══════════════════════════════════════════════════════════════════════════════
#  PAGE 5: FUNDING ASK
#  What you're raising, how you'll use it, and the investor pitch.
# ══════════════════════════════════════════════════════════════════════════════
fundingAsk:
  # Total raise — the amount you're seeking
  # Example: "$500K"
  totalRaise: ""

  # Instrument — type of fundraising instrument
  # Examples: "SAFE", "Convertible Note", "Priced Equity Round"
  instrument: ""

  # Valuation cap / terms — key deal terms
  # Example: "$5M cap, MFN, pro-rata rights"
  valuationCapTerms: ""

  # Target close date — when you aim to close the round
  targetCloseDate: ""

  # Ask one-liner — the pitch in one sentence
  # Format: "We're raising [amount] to [achieve what] by [when]"
  askOneLiner: ""

  # Use of funds — breakdown of how capital will be deployed
  useOfFunds:
    - category: "Product Engineering"  # Spend category
      amount: ""          # Dollar amount for this category
      percentage: ""      # % of total raise
      timeline: ""        # When it will be spent
      milestoneUnlocked: ""  # What this spending enables

  # Elevator pitch — structured narrative for investors
  elevatorPitch:
    # Hook — attention-grabbing opening stat or question
    hook: ""
    # Company intro — what you do in 2 sentences
    companyIntro: ""
    # Traction proof — evidence of product-market fit
    tractionProof: ""
    # Market size — the opportunity in numbers
    marketSize: ""
    # Ask and use — what you need and what it enables
    askAndUse: ""
    # CTA — call to action for investors
    cta: ""

  # Risk register — key risks and mitigations (list 3-5)
  risks:
    - risk: ""             # Description of the risk
      likelihood: "medium" # high | medium | low
      impact: "high"       # high | medium | low
      mitigation: ""       # How you'll address it

# ══════════════════════════════════════════════════════════════════════════════
#  FINANCIAL SNAPSHOT
#  Key financial metrics and projections.
# ══════════════════════════════════════════════════════════════════════════════
financials:
  # Revenue model — how you make money
  # Example: "SaaS subscription + Usage overage fees"
  revenueModel: ""

  # Gross margin — percentage
  # Example: "85%"
  grossMargin: ""

  # Burn rate — monthly cash burn
  # Example: "$15K/mo"
  burnRate: ""

  # Runway — months of cash remaining
  # Example: "18 months at current burn"
  runway: ""

  # Break-even target — when you expect to be profitable
  # Example: "Month 14 at 200 paying customers"
  breakEvenTarget: ""

  # CAC — Customer Acquisition Cost
  # Example: "$45 blended"
  cac: ""

  # LTV — Lifetime Value
  # Example: "$2,400 (24-month avg retention × $100/mo)"
  ltv: ""

  # Projections — 3-5 year financial projections
  projections:
    - year: "Year 1"
      revenue: ""          # e.g. "$120K"
      ebitda: ""           # e.g. "-$80K"
      users: ""            # e.g. "500"
    - year: "Year 2"
      revenue: ""
      ebitda: ""
      users: ""
    - year: "Year 3"
      revenue: ""
      ebitda: ""
      users: ""
    - year: "Year 4"
      revenue: ""
      ebitda: ""
      users: ""