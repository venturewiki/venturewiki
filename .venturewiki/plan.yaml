fundingAsk:
  totalRaise: $250,000
  instrument: SAFE (Simple Agreement for Future Equity)
  valuationCapTerms: $2.5M post-money cap, no discount
  targetCloseDate: Q1 2027
  askOneLiner: Raising $250K to grow VentureWiki from MVP to 5,000 published plans and launch a premium tier generating $5K MRR.
  useOfFunds:
    - category: Engineering
      amount: $100,000
      percentage: 40%
      timeline: 12 months
      milestoneUnlocked: AI plan assistant, premium tier, API
    - category: Community & Growth
      amount: $60,000
      percentage: 24%
      timeline: 12 months
      milestoneUnlocked: 5,000 plans, 10K MAU, 2 accelerator partnerships
    - category: Infrastructure
      amount: $30,000
      percentage: 12%
      timeline: 12 months
      milestoneUnlocked: Hosting, GitHub API usage, CDN, monitoring
    - category: Content & Templates
      amount: $25,000
      percentage: 10%
      timeline: 6 months
      milestoneUnlocked: Industry-specific templates, case studies, tutorial content
    - category: Legal & Admin
      amount: $20,000
      percentage: 8%
      timeline: 3 months
      milestoneUnlocked: Delaware C-Corp, IP assignment, SAFE docs
    - category: Reserve
      amount: $15,000
      percentage: 6%
      timeline: Buffer
      milestoneUnlocked: Runway extension or opportunistic hire
  elevatorPitch:
    hook: Business plans are stuck in the dark ages — locked in PDFs, stale in slide decks, and invisible to the world.
    companyIntro: VentureWiki is the open encyclopedia for digital business plans. Every plan lives as a GitHub repo — structured, version-controlled, and forkable.
    tractionProof: We built the MVP in 3 weeks, our own plan is live on the platform, and the "build in public" movement is creating organic demand for transparent planning tools.
    marketSize: The business planning software market is $1.2B and growing, but no one has built the GitHub/Wikipedia of business plans.
    askAndUse: We're raising $250K on a SAFE to reach 5,000 published plans, launch a premium tier, and build AI-assisted plan generation.
    cta: Check out venturewiki.io — and fork our business plan to start yours.
  risks:
    - risk: Founders don't want to make plans public
      likelihood: medium
      impact: high
      mitigation: Premium tier offers private plans. Many indie hackers already build in public — VentureWiki is the structured version.
    - risk: GitHub API rate limits at scale
      likelihood: low
      impact: medium
      mitigation: Caching layer, GitHub App (higher limits), migrate hot paths to our own DB if needed.
    - risk: Low-quality or spam plans
      likelihood: high
      impact: medium
      mitigation: Community moderation, featured curation, AI quality scoring, GitHub's built-in abuse tools.
    - risk: GitHub changes API terms / pricing
      likelihood: low
      impact: high
      mitigation: Standard GitHub API is stable and free for public repos. We can self-host Gitea as a fallback.
