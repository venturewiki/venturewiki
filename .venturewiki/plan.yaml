problemSolution:
  corePainPoint: >
    Founders lack a structured, version-controlled, collaborative workspace for
    their business plan. Documents rot in Google Docs, pitch decks go stale, and
    there is no public record of a venture's evolution.
  painDimensions:
    who: Early-stage founders, solo operators, and small startup teams
    frequency: Every time they update strategy, seek feedback, or pitch investors
    currentWorkarounds: Google Docs, Notion pages, static PDFs — all siloed and unversioned
    costOfProblem: Wasted time, inconsistent messaging, zero discoverability
    urgencyLevel: Medium — painful but founders work around it
  solutionOneLiner: >
    VentureWiki is GitHub-backed, wiki-style venture documentation with
    structured plan templates, file vaults, and AI-ready APIs.
  features:
    - feature: GitHub-as-database
      benefit: Every edit is a git commit — full history, branches, and diffs for free
      techLayer: GitHub REST API + Octokit
    - feature: Structured plan.yaml template
      benefit: Consistent 5-page schema (Cover, Problem/Solution, Product/GTM, Team/Roadmap, Funding Ask)
      techLayer: YAML + Next.js inline editor
    - feature: File vault (.venturewiki/)
      benefit: Store decks, images, reports and render them inline — no third-party storage
      techLayer: GitHub repo contents API
    - feature: MCP Server (planned)
      benefit: AI agents can read, write, and reason over venture data natively
      techLayer: Model Context Protocol + Octokit
  unfairAdvantage: >
    Uses GitHub as the database — zero infrastructure cost, free git history,
    built-in access control, and seamless developer adoption.
  market:
    tam: Global startup tooling market
    tamSize: $12B
    tamSource: Estimate
    sam: English-language early-stage founders using GitHub
    samSize: $800M
    samSource: Estimate
    som: Bootstrapped cohort in year 1
    somSize: $2M
    somSource: Internal projection

